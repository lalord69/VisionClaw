name: Build iOS App Package

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Inject Network Secrets
        run: |
          cat <<EOF > samples/CameraAccess/CameraAccess/Secrets.swift
          struct Secrets {
              static let geminiApiKey = "${{ secrets.GEMINI_API_KEY }}"
              static let openClawHost = "${{ secrets.OPENCLAW_HOST }}"
              static let openClawPort = ${{ secrets.OPENCLAW_PORT }}
              static let gatewayToken = "${{ secrets.GATEWAY_TOKEN }}"
          }
          EOF

      - name: Compile Application Archive
        run: |
          cd samples/CameraAccess
          xcodebuild archive -project CameraAccess.xcodeproj -scheme CameraAccess -configuration Release -destination 'generic/platform=iOS' -archivePath ./build/VisionClaw.xcarchive CODE_SIGNING_ALLOWED=NO

      - name: Package into IPA
        run: |
          mkdir -p Payload
          cp -r samples/CameraAccess/build/VisionClaw.xcarchive/Products/Applications/CameraAccess.app Payload/
          zip -r VisionClaw.ipa Payload

      - name: Upload Finished App Package
        uses: actions/upload-artifact@v7
        with:
          name: VisionClaw-Installer
          path: VisionClaw.ipa
