name: Build iOS App Package

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Inject Network Secrets
        run: |
          cat <<EOF > samples/CameraAccess/CameraAccess/Secrets.swift
          struct Secrets {
              static let geminiAPIKey = "${{ secrets.GEMINI_API_KEY }}"
              static let openClawHost = "${{ secrets.OPENCLAW_HOST }}"
              static let openClawPort = "${{ secrets.OPENCLAW_PORT }}"
              static let openClawHookToken = "${{ secrets.GATEWAY_TOKEN }}"
              static let openClawGatewayToken = "${{ secrets.GATEWAY_TOKEN }}"
              static let webrtcSignalingURL = "wss://nightcloud.asuscomm.com:18789/ws"
          }
          EOF

      - name: Patch Bluetooth Compilation Bug
        run: |
          # Replaces the deprecated .allowBluetoothHFP with the modern .allowBluetooth syntax to fix the audio crash
          sed -i '' 's/\.allowBluetoothHFP/\.allowBluetooth/g' samples/CameraAccess/CameraAccess/Gemini/AudioManager.swift

      - name: Compile Application Binary
        run: |
          cd samples/CameraAccess
          xcodebuild build \
            -project CameraAccess.xcodeproj \
            -scheme CameraAccess \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath ./DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package into Standalone IPA
        run: |
          mkdir -p Payload
          cp -r samples/CameraAccess/DerivedData/Build/Products/Release-iphoneos/CameraAccess.app Payload/
          zip -r VisionClaw.ipa Payload

      - name: Upload Finished App Package
        uses: actions/upload-artifact@v7
        with:
          name: VisionClaw-Installer
          path: VisionClaw.ipa
