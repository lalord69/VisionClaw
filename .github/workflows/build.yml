name: Build iOS App Package

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer

      - name: Inject Network Secrets
        run: |
          cat <<EOF > samples/CameraAccess/CameraAccess/Secrets.swift
          struct Secrets {
              static let geminiApiKey = "${{ secrets.GEMINI_API_KEY }}"
              static let openClawHost = "${{ secrets.OPENCLAW_HOST }}"
              static let openClawPort = ${{ secrets.OPENCLAW_PORT }}
              static let gatewayToken = "${{ secrets.GATEWAY_TOKEN }}"
          }
          EOF

      - name: Compile Application Binary
        run: |
          cd samples/CameraAccess
          xcodebuild build-for-testing \
            -project CameraAccess.xcodeproj \
            -scheme CameraAccess \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ./DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package into Standalone IPA
        run: |
          mkdir -p Payload
          # Locate the compiled app bundle from the testing build path and copy it into the payload
          cp -r samples/CameraAccess/DerivedData/Build/Products/Debug-iphoneos/CameraAccess.app Payload/
          zip -r VisionClaw.ipa Payload

      - name: Upload Finished App Package
        uses: actions/upload-artifact@v7
        with:
          name: VisionClaw-Installer
          path: VisionClaw.ipa
